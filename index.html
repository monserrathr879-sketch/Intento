<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            color: #fff;
            overflow: hidden;
            cursor: pointer;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-image: url('Screenshot_2026-05-05-17-33-17-044_com.pinterest.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.7);
            z-index: -1;
        }

        .content {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .text-container {
            max-width: 800px;
            font-size: 1.8rem;
            line-height: 1.8;
            font-weight: 500;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        /* Estado inicial: invisible y abajo */
        .fragment {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease; /* Movimiento suave */
        }

        /* Clase para hacer que aparezca */
        .fragment.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .text-container {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="content">
        <div class="text-container" id="text">
            <span class="fragment">Te</span>
            <span class="fragment">amo</span>
            <span class="fragment">sin</span>
            <span class="fragment">saber</span>
            <span class="fragment">cómo,</span>
            <span class="fragment">ni</span>
            <span class="fragment">cuándo,</span>
            <span class="fragment">ni</span>
            <span class="fragment">desde</span>
            <span class="fragment">dónde.</span>
            <br>
            <span class="fragment">Te</span>
            <span class="fragment">amo</span>
            <span class="fragment">simplemente,</span>
            <span class="fragment">sin</span>
            <span class="fragment">problemas</span>
            <span class="fragment">ni</span>
            <span class="fragment">orgullo:</span>
            <br>
            <span class="fragment">te</span>
            <span class="fragment">amo</span>
            <span class="fragment">así</span>
            <span class="fragment">porque</span>
            <span class="fragment">no</span>
            <span class="fragment">conozco</span>
            <span class="fragment">otra</span>
            <span class="fragment">forma</span>
            <span class="fragment">de</span>
            <span class="fragment">amar</span>
            <span class="fragment">sino</span>
            <span class="fragment">esta</span>
        </div>
    </div>

    <script>
        const fragments = document.querySelectorAll('.fragment');
        let isPlaying = false;
        let currentIndex = 0;
        let timeoutId;

        function showNext() {
            if (currentIndex < fragments.length && isPlaying) {
                fragments[currentIndex].classList.add('show');
                currentIndex++;
                // Tiempo entre palabra y palabra (más número = más lento)
                timeoutId = setTimeout(showNext, 600); 
            }
        }

        document.body.addEventListener('click', function() {
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                showNext();
            } else {
                clearTimeout(timeoutId);
            }
        });
    </script>
</body>
</html>
