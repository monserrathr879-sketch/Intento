<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            color: #fff;
            overflow: hidden;
            cursor: pointer; /* Indica que se puede hacer clic */
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-image: url('Screenshot_2026-05-05-17-33-17-044_com.pinterest.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.7);
            z-index: -1;
        }

        .content {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .text-container {
            max-width: 800px;
            font-size: 1.8rem;
            line-height: 1.8;
            font-weight: 500;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        /* Animación más lenta */
        .fragment {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: aparecer 1.2s ease forwards; /* Aumentado de 0.8s a 1.2s */
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Retrasos aumentados para que vaya más despacio */
        .f1 { animation-delay: 0.2s; }
        .f2 { animation-delay: 0.5s; }
        .f3 { animation-delay: 0.8s; }
        .f4 { animation-delay: 1.1s; }
        .f5 { animation-delay: 1.4s; }
        .f6 { animation-delay: 1.7s; }
        .f7 { animation-delay: 2.0s; }
        .f8 { animation-delay: 2.3s; }
        .f9 { animation-delay: 2.6s; }
        .f10 { animation-delay: 2.9s; }
        .f11 { animation-delay: 3.2s; }
        .f12 { animation-delay: 3.5s; }
        .f13 { animation-delay: 3.8s; }
        .f14 { animation-delay: 4.1s; }
        .f15 { animation-delay: 4.4s; }
        .f16 { animation-delay: 4.7s; }
        .f17 { animation-delay: 5.0s; }
        .f18 { animation-delay: 5.3s; }
        .f19 { animation-delay: 5.6s; }
        .f20 { animation-delay: 5.9s; }
        .f21 { animation-delay: 6.2s; }
        .f22 { animation-delay: 6.5s; }
        .f23 { animation-delay: 6.8s; }
        .f24 { animation-delay: 7.1s; }
        .f25 { animation-delay: 7.4s; }
        .f26 { animation-delay: 7.7s; }
        .f27 { animation-delay: 8.0s; }
        .f28 { animation-delay: 8.3s; }
        .f29 { animation-delay: 8.6s; }

        /* Responsive */
        @media (max-width: 768px) {
            .text-container {
                font-size: 1.4rem;
            }
        }

        /* Clase para pausar animaciones */
        .paused .fragment {
            animation-play-state: paused !important;
        }
    </style>
</head>
<body id="body">
    <div class="background"></div>
    <div class="content">
        <div class="text-container">
            <span class="fragment f1">Te</span>
            <span class="fragment f2">amo</span>
            <span class="fragment f3">sin</span>
            <span class="fragment f4">saber</span>
            <span class="fragment f5">cómo,</span>
            <span class="fragment f6">ni</span>
            <span class="fragment f7">cuándo,</span>
            <span class="fragment f8">ni</span>
            <span class="fragment f9">desde</span>
            <span class="fragment f10">dónde.</span>
            <br>
            <span class="fragment f11">Te</span>
            <span class="fragment f12">amo</span>
            <span class="fragment f13">simplemente,</span>
            <span class="fragment f14">sin</span>
            <span class="fragment f15">problemas</span>
            <span class="fragment f16">ni</span>
            <span class="fragment f17">orgullo:</span>
            <br>
            <span class="fragment f18">te</span>
            <span class="fragment f19">amo</span>
            <span class="fragment f20">así</span>
            <span class="fragment f21">porque</span>
            <span class="fragment f22">no</span>
            <span class="fragment f23">conozco</span>
            <span class="fragment f24">otra</span>
            <span class="fragment f25">forma</span>
            <span class="fragment f26">de</span>
            <span class="fragment f27">amar</span>
            <span class="fragment f28">sino</span>
            <span class="fragment f29">esta</span>
        </div>
    </div>

    <script>
        // Función para pausar y despausar al hacer clic
        const body = document.getElementById('body');
        body.addEventListener('click', function() {
            this.classList.toggle('paused');
        });
    </script>
</body>
</html>
